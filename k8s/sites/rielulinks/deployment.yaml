apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: web-rielulinks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-rielulinks
  template:
    metadata:
      labels:
        app: web-rielulinks
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: index.html
