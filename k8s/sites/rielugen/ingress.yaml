apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rielu-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: rielugen.uniproject.jp
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
