apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: site-a
spec:
  ingressClassName: nginx
  rules:
    - host: site-a.example.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx
                port:
                  number: 80
