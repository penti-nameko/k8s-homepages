apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: websites
  namespace: argocd
spec:
  description: nginx website project
  sourceRepos:
    - '*'
  destinations:
    - namespace: site-a
      server: https://kubernetes.default.svc
    - namespace: site-b
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
