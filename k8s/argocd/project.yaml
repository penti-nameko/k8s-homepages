apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: websites
  namespace: argocd
spec:
  description: nginx website project
  sourceRepos:
    - https://github.com/penti-nameko/k8s-homepages.git
  destinations:
    - namespace: web-*
      server: https://kubernetes.default.svc
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: apps
      kind: Deployment
    - group: networking.k8s.io
      kind: Ingress
