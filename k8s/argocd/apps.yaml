apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: site-a
  namespace: argocd
spec:
  project: websites
  source:
    repoURL: REPLACE_WITH_YOUR_REPO_URL
    targetRevision: HEAD
    path: k8s/sites/site-a
  destination:
    server: https://kubernetes.default.svc
    namespace: site-a
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
---
