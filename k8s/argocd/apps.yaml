apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rielu
  namespace: argocd
spec:
  project: websites
  source:
    repoURL: https://github.com/penti-nameko/k8s-homepages.git
    targetRevision: HEAD
    path: k8s/sites/site-a
  destination:
    server: https://kubernetes.default.svc
    namespace: rielu
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
